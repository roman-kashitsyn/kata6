on: [pull_request]

name: CI
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Lint
        run: uv run ruff check
      - name: Test
        run: uv run pytest --junitxml=junit/test-results.xml --cov --cov-report=xml --cov-report=html
